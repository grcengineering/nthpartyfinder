name: Docker Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

# Least-privilege default; the build job widens to packages: write for pushes.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

defaults:
  run:
    working-directory: nthpartyfinder

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download model files
        env:
          HF_COMMIT: 8142fb00740ccea973e64b1272949ff48653df5e
          MODEL_SHA256: c76c90920547fd937aaf505e7f2de5ec73168bf1c25abbb55a298104cb061400
          TOKENIZER_SHA256: 677203884d026e721115cf0daccf70ec4239545a13d6619e3e66d7151e0c9ce3
          CONFIG_SHA256: 8aece71b73ca0fbd6dd121ad755deb736e7757d053ced523c2e4959ff446d3f5
        run: |
          set -e
          BASE="https://huggingface.co/onnx-community/gliner_small-v2.1/resolve/${HF_COMMIT}"
          mkdir -p models
          curl -fSL "${BASE}/onnx/model_int8.onnx" -o models/gliner_small.onnx
          curl -fSL "${BASE}/tokenizer.json" -o models/tokenizer.json
          curl -fSL "${BASE}/config.json" -o models/config.json
          echo "${MODEL_SHA256}  models/gliner_small.onnx" | sha256sum -c -
          echo "${TOKENIZER_SHA256}  models/tokenizer.json" | sha256sum -c -
          echo "${CONFIG_SHA256}  models/config.json" | sha256sum -c -

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (default - with embedded NER)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: nthpartyfinder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SLSA provenance + SBOM attestation (buildx-native), matching the SLSA/SBOM
          # coverage the binary release path already has (release.yml) — previously this
          # workflow had neither. Gated the same as `push:`: attestations need an actual
          # registry destination, so they're a no-op on PR builds anyway.
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Build and push (slim - without embedded NER)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: nthpartyfinder
          file: nthpartyfinder/Dockerfile.dev
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
