name: Docker Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

defaults:
  run:
    working-directory: nthpartyfinder

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download model files
        env:
          HF_COMMIT: 8142fb00740ccea973e64b1272949ff48653df5e
          MODEL_SHA256: c76c90920547fd937aaf505e7f2de5ec73168bf1c25abbb55a298104cb061400
          TOKENIZER_SHA256: 677203884d026e721115cf0daccf70ec4239545a13d6619e3e66d7151e0c9ce3
          CONFIG_SHA256: 8aece71b73ca0fbd6dd121ad755deb736e7757d053ced523c2e4959ff446d3f5
        run: |
          set -e
          BASE="https://huggingface.co/onnx-community/gliner_small-v2.1/resolve/${HF_COMMIT}"
          mkdir -p models
          curl -fSL "${BASE}/onnx/model_int8.onnx" -o models/gliner_small.onnx
          curl -fSL "${BASE}/tokenizer.json" -o models/tokenizer.json
          curl -fSL "${BASE}/config.json" -o models/config.json
          echo "${MODEL_SHA256}  models/gliner_small.onnx" | sha256sum -c -
          echo "${TOKENIZER_SHA256}  models/tokenizer.json" | sha256sum -c -
          echo "${CONFIG_SHA256}  models/config.json" | sha256sum -c -

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (default - with embedded NER)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: nthpartyfinder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (slim - without embedded NER)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: nthpartyfinder
          file: nthpartyfinder/Dockerfile.dev
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max
