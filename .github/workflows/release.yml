name: Release

on:
  push:
    tags: ['v*']

env:
  NER_MODEL_CACHE_KEY: ner-model-v1

defaults:
  run:
    working-directory: nthpartyfinder

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify CHANGELOG entry
        shell: bash
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          grep -q "## \[${TAG#v}\]" CHANGELOG.md \
            || (echo "CHANGELOG entry missing for $TAG" && exit 1)

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: nthpartyfinder -> target

      - name: Cache NER model
        id: cache-ner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nthpartyfinder/models
          key: ${{ env.NER_MODEL_CACHE_KEY }}-${{ hashFiles('nthpartyfinder/scripts/download-model.sh') }}
      - name: Download NER model (Unix)
        if: steps.cache-ner.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: bash scripts/download-model.sh
      - name: Download NER model (Windows)
        if: steps.cache-ner.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        working-directory: nthpartyfinder
        run: .\scripts\download-model.ps1

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf nthpartyfinder-${{ matrix.target }}.tgz nthpartyfinder*
          if command -v shasum &>/dev/null; then
            shasum -a 256 nthpartyfinder-${{ matrix.target }}.tgz > nthpartyfinder-${{ matrix.target }}.tgz.sha256
          else
            sha256sum nthpartyfinder-${{ matrix.target }}.tgz > nthpartyfinder-${{ matrix.target }}.tgz.sha256
          fi

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            nthpartyfinder/target/${{ matrix.target }}/release/nthpartyfinder-${{ matrix.target }}.tgz
            nthpartyfinder/target/${{ matrix.target }}/release/nthpartyfinder-${{ matrix.target }}.tgz.sha256
