name: Release

on:
  push:
    tags: ['v*']

# Least-privilege default; each job widens to exactly what it needs.
permissions:
  contents: read

env:
  NER_MODEL_CACHE_KEY: ner-model-v1

defaults:
  run:
    working-directory: nthpartyfinder

jobs:
  # GitHub "immutable releases" forbid asset changes AFTER a release is published.
  # So create the release as a DRAFT up front (a single job — no parallel-create
  # race), have every downstream job push its assets to the still-mutable draft,
  # and publish exactly once at the very end (the `publish` job).
  create-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify CHANGELOG entry
        shell: bash
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          grep -q "## \[${TAG#v}\]" CHANGELOG.md \
            || (echo "CHANGELOG entry missing for $TAG" && exit 1)

      - name: Extract release notes from CHANGELOG
        shell: bash
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"; VER="${TAG#v}"
          awk -v v="$VER" '
            index($0, "## [" v "]") == 1 { f = 1; print; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/notes.md"
          echo "----- release notes -----"; cat "$RUNNER_TEMP/notes.md"

      - name: Create (or reset) the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft --title "$TAG" --notes-file "$RUNNER_TEMP/notes.md"
          else
            gh release create "$TAG" --draft --title "$TAG" --notes-file "$RUNNER_TEMP/notes.md"
          fi

  build-release:
    needs: create-draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: nthpartyfinder -> target

      - name: Cache NER model
        id: cache-ner
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: nthpartyfinder/models
          key: ${{ env.NER_MODEL_CACHE_KEY }}-${{ hashFiles('nthpartyfinder/scripts/download-model.sh') }}
      - name: Download NER model (Unix)
        if: steps.cache-ner.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: bash scripts/download-model.sh
      - name: Download NER model (Windows)
        if: steps.cache-ner.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        working-directory: nthpartyfinder
        run: .\scripts\download-model.ps1

      # Release binaries stay SELF-CONTAINED: the crate default is now `runtime-ner`
      # (model fetched at runtime for crates.io installs), but downloadable binaries
      # must work offline, so build with `embedded-ner` to bake the model in via
      # include_bytes! (the download-model.sh step above provides the files).
      - run: cargo build --release --locked --target ${{ matrix.target }} --no-default-features --features embedded-ner

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf nthpartyfinder-${{ matrix.target }}.tgz nthpartyfinder*
          if command -v sha256sum &>/dev/null; then
            sha256sum nthpartyfinder-${{ matrix.target }}.tgz > nthpartyfinder-${{ matrix.target }}.tgz.sha256
          else
            shasum -a 256 nthpartyfinder-${{ matrix.target }}.tgz > nthpartyfinder-${{ matrix.target }}.tgz.sha256
          fi

      # Upload to the DRAFT (mutable) release — never publishes, so it never trips
      # the immutable-release asset lock even when four matrix jobs run in parallel.
      - name: Upload binary to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          gh release upload "$TAG" \
            "target/${{ matrix.target }}/release/nthpartyfinder-${{ matrix.target }}.tgz" \
            "target/${{ matrix.target }}/release/nthpartyfinder-${{ matrix.target }}.tgz.sha256" \
            --clobber

      # Per-target digest for SLSA provenance aggregation (B5).
      - name: Export artifact digest
        id: digest
        shell: bash
        working-directory: nthpartyfinder/target/${{ matrix.target }}/release
        run: |
          if command -v sha256sum &>/dev/null; then HASH=$(sha256sum nthpartyfinder-${{ matrix.target }}.tgz);
          else HASH=$(shasum -a 256 nthpartyfinder-${{ matrix.target }}.tgz); fi
          echo "value=$(echo -n "$HASH" | base64 | tr -d '\n')" >> "$GITHUB_OUTPUT"
      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.target }}
          path: nthpartyfinder/target/${{ matrix.target }}/release/nthpartyfinder-${{ matrix.target }}.tgz.sha256
          retention-days: 1

  # ── SLSA provenance (B5 — SLSA v1.2 Build L3 via slsa-github-generator) ────
  # Aggregate every matrix artifact digest, then emit signed provenance.
  combine-digests:
    name: Combine digests
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .
    outputs:
      digests: ${{ steps.combine.outputs.digests }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          path: digests
      - id: combine
        run: |
          cat digests/*/*.sha256 > all-digests.txt
          echo "digests=$(base64 -w0 < all-digests.txt)" >> "$GITHUB_OUTPUT"

  provenance:
    needs: combine-digests
    permissions:
      actions: read       # read workflow metadata
      id-token: write     # keyless cosign / Fulcio OIDC
      contents: write     # emit provenance (attached to the release by `publish`)
    # NOTE: slsa-github-generator MUST be referenced by semantic tag, not SHA —
    # its TUF/slsa-verifier trust model binds builder identity to the tag. This
    # is the one sanctioned non-SHA pin (OpenSSF Scorecard documents this
    # Pinned-Dependencies exception for slsa-github-generator).
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.combine-digests.outputs.digests }}
      # Do NOT let the generator attach to the release directly: with immutable
      # releases the asset must land while the release is still a draft. The
      # `publish` job downloads the provenance artifact (output `provenance-name`)
      # and attaches it to the draft before flipping it to published.
      upload-assets: false

  # Attach the provenance to the still-draft release, then publish once — after
  # this step no more assets are added, so the immutable lock is satisfied.
  publish:
    needs: [build-release, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Download provenance artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: provenance
      - name: Attach provenance and publish the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          # This job has no checkout, so gh cannot infer the repo from a git
          # remote — GH_REPO tells it explicitly (otherwise: "not a git repository").
          GH_REPO: ${{ github.repository }}
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/}"
          gh release upload "$TAG" provenance/* --clobber
          gh release edit "$TAG" --draft=false --latest
