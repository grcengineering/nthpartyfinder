[advisories]
# Auto-flag any ignore entry below that no longer matches a live advisory —
# guards against the stale-suppression anti-pattern (a real finding hiding in a
# dead ignore list). cargo-deny >=0.19.x supports this.
unused-ignored-advisory = "warn"
# ─── Advisory Triage (GRC-138, 2026-04-29) ───────────────────────────────────
#
# Methodology: cargo audit + cargo deny against RustSec advisory-db (1060
# advisories). cargo update + dependency upgrades applied first to resolve
# what we can. Remaining items documented below with risk acceptance.
#
# RESOLVED by this commit:
#   RUSTSEC-2026-0097 (rand)          — fixed by cargo update (0.8.5→0.8.6, 0.9.2→0.9.4)
#   RUSTSEC-2025-0057 (fxhash)        — fixed by upgrading scraper 0.18→0.26
#   RUSTSEC-2025-0134 (rustls-pemfile) — fixed by upgrading reqwest 0.11→0.12
#
# REMAINING (3 items, all transitive — no upstream fix available):
# ──────────────────────────────────────────────────────────────────────────────
ignore = [
    # REMEDIATED 2026-06-16: RUSTSEC-2024-0421 (idna 0.5.0 — Punycode validation)
    #   was a code-level fix, not a suppression: whois-rs (its sole source, via
    #   validators 0.25.3) was REMOVED and replaced with an in-process TCP WHOIS
    #   client (src/whois.rs). idna 0.5.0 is no longer in the tree (only idna 1.x
    #   via url remains). Ignore entry deleted; `cargo deny check advisories` finds
    #   no crate matching the advisory.

    # RISK ACCEPTANCE: RUSTSEC-2025-0119 (number_prefix 0.4.0 — unmaintained)
    # Type: unmaintained (informational warning, not a vulnerability)
    # Impact: transitive via indicatif 0.17.11 → tokenizers/hf-hub. Used only
    #   for progress bar display formatting. No security surface.
    # Root cause: indicatif uses number_prefix for human-readable byte counts.
    #   No alternative available in indicatif's dependency tree.
    # Accepted: 2026-04-29 by Founding Engineer (agent e8a18920)
    { id = "RUSTSEC-2025-0119", reason = "transitive via indicatif; progress bar formatting only, no security surface" },

    # RISK ACCEPTANCE: RUSTSEC-2024-0436 (paste 1.0.15 — unmaintained)
    # Type: unmaintained (informational warning, not a vulnerability)
    # Impact: compile-time proc-macro only. Generates code at build time,
    #   ships no runtime code in the binary. Zero production attack surface.
    # Root cause: transitive via tokenizers 0.21.4 and macro_rules_attribute.
    #   Cannot eliminate without replacing the tokenizer dependency.
    # Mitigation: paste v1.0.15 by dtolnay is functionally complete with 14k+
    #   reverse dependents. No CVEs filed against paste.
    # Accepted: 2026-04-29 by Founding Engineer (agent e8a18920)
    { id = "RUSTSEC-2024-0436", reason = "compile-time proc-macro only, no runtime attack surface; functionally complete, no known CVEs" },

    # REMEDIATED 2026-05-30 (GRC-368): RUSTSEC-2026-0118 (hickory-proto NSEC3 unbounded loop)
    #   was CLEARED by bumping hickory-resolver 0.25.2 -> 0.26.1 (pulls hickory-proto 0.26.1).
    #   `cargo deny check advisories` confirms "no crate matched advisory criteria" for it.
    #   Ignore entry removed (a code-level fix, not a suppression) — no longer applicable.

    # REMEDIATED: RUSTSEC-2026-0119 (hickory-proto — O(n²) name compression DoS)
    #   Path (a) hickory-resolver → hickory-proto: fixed 2026-05-30 (GRC-368) by the
    #     hickory-resolver 0.25.2 → 0.26.1 bump (now on hickory-proto 0.26.1).
    #   Path (b) whois-rs 1.6.1 → hickory-client 0.24.4 → hickory-proto 0.24.4: fixed
    #     2026-06-16 by REMOVING whois-rs (replaced with an in-process TCP WHOIS client,
    #     src/whois.rs) — a code-level remediation, not a risk acceptance. hickory-proto
    #     0.24 / hickory-client are no longer in the tree; only hickory-proto 0.26.1 remains.
    #   Ignore entry deleted; `cargo deny check advisories` finds no crate matching it.
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]

[[licenses.exceptions]]
name = "auto_generate_cdp"
allow = ["GPL-3.0-or-later"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
