[advisories]
ignore = [
    "RUSTSEC-2026-0097",
    "RUSTSEC-2024-0421",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]

[[licenses.exceptions]]
name = "auto_generate_cdp"
allow = ["GPL-3.0-or-later"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
