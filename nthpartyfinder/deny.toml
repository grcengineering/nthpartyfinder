[advisories]
ignore = [
    "RUSTSEC-2026-0097",
    "RUSTSEC-2024-0421",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0134",
]

[licenses]
unlicensed = "deny"
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "ISC", "MPL-2.0"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
