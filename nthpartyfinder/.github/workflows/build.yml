name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run unit tests
        run: cargo test --lib --locked --verbose

  test-integration:
    name: Integration Tests
    needs: test-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cache NER model
        id: cache-ner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nthpartyfinder/models
          key: ner-model-${{ hashFiles('nthpartyfinder/scripts/download-model.sh') }}

      - name: Download NER model on cache miss
        if: steps.cache-ner.outputs.cache-hit != 'true'
        run: bash nthpartyfinder/scripts/download-model.sh

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: onnxruntime-linux-x64-1.20.1
          key: ort-Linux-1.20.1

      - name: Download ONNX Runtime on cache miss
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          curl -L -o ort.tgz https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
          tar xzf ort.tgz
          rm ort.tgz

      - name: Run integration tests
        env:
          ORT_DYLIB_PATH: ${{ github.workspace }}/onnxruntime-linux-x64-1.20.1/lib/libonnxruntime.so
        run: cargo test --test "*" --locked --verbose
        timeout-minutes: 10

  coverage:
    name: Code Coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@4c6ee9b0c14666cb5ccda351bcaf3b49e9bd74f4 # cargo-llvm-cov
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cache NER model
        id: cache-ner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nthpartyfinder/models
          key: ner-model-${{ hashFiles('nthpartyfinder/scripts/download-model.sh') }}

      - name: Download NER model on cache miss
        if: steps.cache-ner.outputs.cache-hit != 'true'
        run: bash nthpartyfinder/scripts/download-model.sh

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: onnxruntime-linux-x64-1.20.1
          key: ort-Linux-1.20.1

      - name: Download ONNX Runtime on cache miss
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          curl -L -o ort.tgz https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
          tar xzf ort.tgz
          rm ort.tgz

      - name: Generate coverage
        env:
          ORT_DYLIB_PATH: ${{ github.workspace }}/onnxruntime-linux-x64-1.20.1/lib/libonnxruntime.so
        run: |
          cargo llvm-cov --locked --all-features --workspace --fail-under-lines 70 \
            --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  build:
    name: Build
    needs: [test-unit, lint]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nthpartyfinder
            asset_name: nthpartyfinder-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nthpartyfinder.exe
            asset_name: nthpartyfinder-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nthpartyfinder
            asset_name: nthpartyfinder-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nthpartyfinder
            asset_name: nthpartyfinder-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Cache NER model
        id: cache-ner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nthpartyfinder/models
          key: ner-model-${{ hashFiles('nthpartyfinder/scripts/download-model.sh') }}

      - name: Download NER model on cache miss
        if: steps.cache-ner.outputs.cache-hit != 'true'
        shell: bash
        run: bash nthpartyfinder/scripts/download-model.sh

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y whois

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install whois

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  test-ner-windows:
    name: NER load test (Windows)
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cache NER model
        id: cache-ner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: nthpartyfinder/models
          key: ner-model-${{ hashFiles('nthpartyfinder/scripts/download-model.sh') }}

      - name: Download NER model on cache miss
        if: steps.cache-ner.outputs.cache-hit != 'true'
        shell: bash
        run: bash nthpartyfinder/scripts/download-model.sh

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: onnxruntime-win-x64-1.20.1
          key: ort-Windows-1.20.1

      - name: Download ONNX Runtime on cache miss
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-win-x64-1.20.1.zip -OutFile ort.zip
          Expand-Archive ort.zip -DestinationPath .
          Remove-Item ort.zip

      - name: Run NER load test
        env:
          ORT_DYLIB_PATH: ${{ github.workspace }}/onnxruntime-win-x64-1.20.1/lib/onnxruntime.dll
        run: cargo test --test ner_org_tests --locked -- --nocapture
